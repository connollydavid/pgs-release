name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Materialize punkgraphicstream
        id: pgs
        uses: ./.github/actions/host-lifecycle
        with:
          item: punkgraphicstream

      - name: Materialize libpgs-jni
        id: jni
        uses: ./.github/actions/host-lifecycle
        with:
          item: libpgs-jni

      - name: Materialize libass
        id: libass
        uses: ./.github/actions/host-lifecycle
        with:
          item: libass

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake make libtool pkg-config gcc nasm ffmpeg \
            libfontconfig1-dev libfreetype6-dev libfribidi-dev libharfbuzz-dev

      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Build libass (static)
        run: |
          cd software/libass/master
          ./autogen.sh
          ./configure --disable-shared --enable-static --with-pic --prefix=$PWD/install
          make -j$(nproc)
          make install

      - name: Build libpgs-jni
        run: |
          gcc -fPIC -shared -std=c99 -Wall -O2 \
            -I software/libpgs-jni/master \
            -I software/libass/master/install/include/ass \
            -I $JAVA_HOME/include \
            -I $JAVA_HOME/include/linux \
            software/libpgs-jni/master/name_connolly_david_pgs_Render.c \
            -L software/libass/master/install/lib -Wl,-Bstatic -lass -Wl,-Bdynamic \
            $(pkg-config --libs freetype2 fontconfig fribidi harfbuzz) \
            -lm \
            -o software/punkgraphicstream/master/libpgs-jni.so

      - name: Build Java app
        run: |
          cd software/punkgraphicstream/master
          mvn package -B

      - name: Acceptance test - encode ASS to SUP
        run: |
          cd software/punkgraphicstream/master
          java -Djava.library.path=. \
            -cp target/pgs-*.jar \
            name.connolly.david.pgs.console.PunkGraphicStream \
            src/test/resources/test.ass film hd_1080

      - name: Acceptance test - verify SUP with ffprobe
        run: |
          ffprobe -v error -show_streams software/punkgraphicstream/master/src/test/resources/test.sup \
            | grep codec_name=hdmv_pgs_subtitle

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pgs-linux-x86_64
          path: |
            software/punkgraphicstream/master/target/pgs-*.jar
            software/punkgraphicstream/master/libpgs-jni.so
